<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, shrink-to-fit=no"
		/>
		<title>Flap Frenzy</title>
		<!-- Meta tags for better VR browser support -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<!-- CSS only -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor"
			crossorigin="anonymous"
		/>
		<!-- JavaScript Bundle with Popper -->
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
			crossorigin="anonymous"
		></script>
	</head>
	<body style="margin: 0">
		<div id="scene-container" style="display: block"></div>

		<div id="ui-panel" class="card">
			<div class="card-body">
				<h5 class="card-title">Flap Frenzy!</h5>
				<p class="card-subtitle mb-2 text-body-secondary">
					This is a sample WebXR VR experience.
				</p>
				<div id="scoreboard-ui" aria-live="polite">
					<div class="scoreboard-item">
						<span class="score-label">Current Score</span>
						<span id="current-score-value" class="score-value">0</span>
					</div>
					<div class="scoreboard-item">
						<span class="score-label">Latest Score</span>
						<span id="latest-score-value" class="score-value">0</span>
					</div>
					<div class="scoreboard-item">
						<span class="score-label">Highest Score</span>
						<span id="highest-score-value" class="score-value">0</span>
					</div>
				</div>

				<button id="vr-button" type="button" class="btn action-button">
					ENTER VR
				</button>
				<button id="web-launch-button" type="button" class="btn action-button">
					OPEN ON META QUEST
				</button>
			</div>
		</div>
	</body>
</html>
